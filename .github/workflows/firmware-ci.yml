name: Firmware CI

on:
  push:
    branches: [ ci-cd ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

-      name: Install ARM GCC
       run: |
         sudo apt update
         sudo apt install -y --no-install-recommends \
         gcc-arm-none-eabi \
         cmake \
         ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=cmake/gcc-arm-none-eabi.cmake

      - name: Build
        run: |
          cmake --build build

      - name: Check stack usage
        run: python3 scripts/check_stack_usage.py

      - name: Run cppcheck
        run: |
          sudo apt-get install -y cppcheck

          cppcheck --enable=warning,style,performance,portability \
                   --std=c++17 \
                   --inline-suppr \
                   App Services Drivers Legacy Config Common

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build
          path: |
            build/**/*.elf
            build/**/*.hex
            build/**/*.bin
            build/**/*.map
            build/**/*.su

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Configure tests
        run: |
          cmake -S Tests -B build-tests -G Ninja

      - name: Build tests
        run: |
          cmake --build build-tests

      - name: Run tests
        run: |
          ctest --test-dir build-tests --output-on-failure
  docker-build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t stm32-fw-ci .

      - name: Build firmware inside Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace stm32-fw-ci \
            cmake -B build-docker -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/gcc-arm-none-eabi.cmake

          docker run --rm -v ${{ github.workspace }}:/workspace stm32-fw-ci \
            cmake --build build-docker

      - name: Run unit tests inside Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace stm32-fw-ci \
            cmake -S Tests -B build-tests-docker -G Ninja

          docker run --rm -v ${{ github.workspace }}:/workspace stm32-fw-ci \
            cmake --build build-tests-docker

          docker run --rm -v ${{ github.workspace }}:/workspace stm32-fw-ci \
            ctest --test-dir build-tests-docker --output-on-failure